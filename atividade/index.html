<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agendamento - Salão de Beleza</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      margin: 0;
      padding: 0;
    }header {
  background: #d63384;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  color: #d63384;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 10px;
  background: #d63384;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #b02a6b;
}

.success {
  margin-top: 15px;
  color: green;
  text-align: center;
  display: none;
}

  </style>
</head>
<body><header>
  <h1>Salão Bella Vida</h1>
  <p>Agende seu horário online</p>
</header><div class="container">
  <h2>Agendamento</h2>  <form id="formAgendamento">
    <label>Nome:</label>
    <input type="text" required><label>Telefone:</label>
<input type="tel" required>

<label>Serviço:</label>
<select required>
  <option value="">Selecione</option>
  <option>Unha</option>
  <option>Cabelo</option>
  <option>Cílios</option>
  <option>Sobrancelha</option>
</select>

<label>Data:</label>
<input type="date" required>

<label>Horário:</label>
<input type="time" required>

<button type="submit">Agendar</button>

  </form>  <div class="success" id="mensagem">
    Agendamento realizado com sucesso! 💅
  </div>
</div><script>
  const form = document.getElementById('formAgendamento');
  const mensagem = document.getElementById('mensagem');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    mensagem.style.display = 'block';
    form.reset();
  });
</script></body>
</html>
